name: Update EVE SDE and Release DBs

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: 

jobs:
  check-and-update-sde:
    runs-on: ubuntu-latest
    outputs:
      update_needed: ${{ steps.compare.outputs.update_needed }}
      latest_build:  ${{ steps.get_latest_sde.outputs.latest_build }}
      version_tag:   ${{ steps.release_version.outputs.version_tag }}
      version_name:  ${{ steps.release_version.outputs.version_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect trigger type
        id: trigger_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_manual=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_manual=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (Lightweight)
        run: |
          sudo apt-get update
          sudo apt-get install -y libyaml-dev

      - name: Get previous build from latest release
        id: get_previous_sde
        run: |
          latest_tag=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$latest_tag" ]; then
            version_part="${latest_tag#sde-}"
            previous_build="${version_part%%.*}"
          else
            previous_build=""
          fi
          echo "previous_build=${previous_build}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get latest SDE build number from CCP
        id: get_latest_sde
        run: |
          BASE="https://developers.eveonline.com/static-data"
          curl -s "$BASE/tranquility/latest.jsonl" > latest.jsonl

          python3 << 'PYCODE'
          import os, json

          latest_build = None
          with open("latest.jsonl", "r", encoding="utf-8") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  rec = json.loads(line)
                  if rec.get("_key") == "sde":
                      latest_build = str(rec["buildNumber"])
                      break

          if not latest_build:
              raise SystemExit("Could not find SDE buildNumber in latest.jsonl")

          print(f"Latest SDE build number: {latest_build}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"latest_build={latest_build}\n")
          PYCODE
        shell: bash

      - name: Decide whether to update
        id: compare
        run: |
          if [ "${{ steps.trigger_type.outputs.is_manual }}" = "true" ] || [ "${{ steps.get_latest_sde.outputs.latest_build }}" != "${{ steps.get_previous_sde.outputs.previous_build }}" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download SDE from CCP
        if: steps.compare.outputs.update_needed == 'true'
        run: |
          BUILD="${{ steps.get_latest_sde.outputs.latest_build }}"
          curl -L -o sde.zip "https://developers.eveonline.com/static-data/tranquility/eve-online-static-data-${BUILD}-yaml.zip"
          unzip -q sde.zip -d sde

      - name: Upload SDE artifact
        if: steps.compare.outputs.update_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sde-data
          path: sde/
          retention-days: 1

      - name: Determine release version
        id: release_version
        if: steps.compare.outputs.update_needed == 'true'
        run: |
          BUILD="${{ steps.get_latest_sde.outputs.latest_build }}"
          VERSION_TAG="sde-${BUILD}.$(date +%H%M)"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_name=SDE ${BUILD} (Auto-Export)" >> "$GITHUB_OUTPUT"

  build-sqlite:
    needs: check-and-update-sde
    if: needs.check-and-update-sde.outputs.update_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download SDE artifact
        uses: actions/download-artifact@v4
        with:
          name: sde-data
          path: sde/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get install -y libyaml-dev
          pip install --no-input -q -r requirements.txt
      
      - name: Run Load.py
        run: python3 -u Load.py sqlite en --create-stripped

      - name: Export Tables to CSV
        run: |
          mkdir -p csv-exports
          python3 export_csvs.py
          if [ -d "../eve-sde-dump" ]; then
            mv ../eve-sde-dump/*.csv ./csv-exports/
          else
            echo "Export directory not found!"
            exit 1
          fi

      - name: Upload database and CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sde-sqlite
          path: |
            eve.db
            eve-stripped.db
            csv-exports/*.csv
          retention-days: 7

  create-release:
    runs-on: ubuntu-latest
    needs: [check-and-update-sde, build-sqlite]
    if: needs.check-and-update-sde.outputs.update_needed == 'true' && github.ref == 'refs/heads/main'
    steps:
      - name: Download processed artifacts
        uses: actions/download-artifact@v4
        with:
          name: sde-sqlite
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-and-update-sde.outputs.version_tag }}
          name: ${{ needs.check-and-update-sde.outputs.version_name }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}